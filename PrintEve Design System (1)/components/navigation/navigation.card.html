<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--color-background); }
  .wrap { display: flex; flex-direction: column; gap: 20px; max-width: 640px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Accordion, Tabs } = window.PrintEveDesignSystem_a6adda;
function Demo() {
  return (
    <div className="wrap">
      <Tabs tabs={[
        { label: "Description", content: <p style={{color:'var(--color-text-muted)',fontSize:'14px',margin:0,lineHeight:1.6}}>Premium 350gsm matte business cards with a soft-touch laminate finish.</p> },
        { label: "Specifications", content: <p style={{color:'var(--color-text-muted)',fontSize:'14px',margin:0}}>90 × 54mm · 350gsm · CMYK · 3mm bleed</p> },
        { label: "Reviews", content: <p style={{color:'var(--color-text-muted)',fontSize:'14px',margin:0}}>4.8 / 5 from 1,240 verified orders.</p> },
      ]} />
      <Accordion items={[
        { question: "What file formats do you accept?", answer: "We accept PDF, AI, EPS, PSD, PNG and JPG. For best results, submit print-ready PDFs at 300 DPI with a 3mm bleed." },
        { question: "How long does delivery take?", answer: "Standard orders are produced within 24–72 hours depending on product and quantity." },
        { question: "Do you offer bulk pricing?", answer: "Yes — per-unit rates improve automatically at higher quantity slabs." },
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
