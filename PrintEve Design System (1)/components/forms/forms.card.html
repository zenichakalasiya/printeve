<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--color-background); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; max-width: 640px; }
  .span { grid-column: 1 / -1; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Select, Textarea } = window.PrintEveDesignSystem_a6adda;
const Search = () => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
function Demo() {
  return (
    <div className="grid">
      <Input label="Full name" placeholder="Aditi Sharma" required />
      <Input label="Search products" icon={<Search />} placeholder="Business cards…" />
      <Select label="Paper finish" placeholder="Choose finish" options={["Matte","Gloss","Soft-touch","Recycled"]} />
      <Input label="Pincode" error="Enter a valid 6-digit pincode" defaultValue="12" />
      <div className="span"><Textarea label="Project brief" rows={3} placeholder="Tell us about your print job…" /></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
