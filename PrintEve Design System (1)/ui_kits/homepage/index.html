<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PrintEve — Professional Printing Made Simple</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; }
  .pe-home { background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); min-height: 100vh; }
  .sec { padding-block: clamp(56px, 7vw, 88px); }
  .sec--alt { background: var(--color-surface); border-block: 1px solid var(--color-border); }
  .sec__head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 40px; flex-wrap: wrap; }
  .sec__eyebrow { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--color-primary); margin-bottom: 12px; }
  .sec__title { font: var(--text-h2); letter-spacing: var(--tracking-tight); color: var(--color-text); margin: 0; max-width: 18ch; }
  .sec__sub { margin: 12px 0 0; color: var(--color-text-muted); font-size: var(--text-lg); max-width: 54ch; line-height: var(--leading-relaxed); }
  .sec__link { display: inline-flex; align-items: center; gap: 6px; color: var(--color-primary); font-weight: 600; font-size: var(--text-sm); text-decoration: none; white-space: nowrap; transition: gap .15s; }
  .sec__link:hover { gap: 9px; }
  /* Header */
  .hd { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--color-background) 88%, transparent); backdrop-filter: saturate(140%) blur(10px); border-bottom: 1px solid transparent; transition: box-shadow .2s, border-color .2s; }
  .hd[data-scrolled="true"] { box-shadow: var(--shadow-card); border-bottom-color: var(--color-border); }
  .hd__top { background: var(--color-surface); border-bottom: 1px solid var(--color-border); font-size: 12px; color: var(--color-text-muted); }
  .hd__top-inner { display: flex; align-items: center; justify-content: space-between; padding-block: 8px; }
  .hd__top-links { display: flex; align-items: center; gap: 18px; }
  .hd__top-link { display: inline-flex; align-items: center; gap: 5px; color: var(--color-text-muted); text-decoration: none; }
  .hd__top-link:hover { color: var(--color-primary); }
  @media (max-width: 860px) { .hd__top { display: none; } }
  .hd__main { display: flex; align-items: center; gap: 18px; padding-block: 14px; }
  .hd__logo { display: inline-flex; align-items: center; gap: 9px; text-decoration: none; flex-shrink: 0; }
  .hd__logo img { width: 34px; height: 34px; }
  .hd__logo span { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; color: var(--color-text); }
  .hd__nav { display: flex; align-items: center; gap: 2px; margin-left: 10px; }
  @media (max-width: 1080px) { .hd__nav { display: none; } }
  .hd__navlink { display: inline-flex; align-items: center; gap: 4px; padding: 8px 12px; border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; color: var(--color-text); background: none; border: 0; cursor: pointer; text-decoration: none; font-family: inherit; }
  .hd__navlink:hover { background: var(--color-surface); color: var(--color-primary); }
  .hd__mega-wrap { position: relative; }
  .hd__mega { position: absolute; left: 0; top: 100%; width: 640px; background: var(--color-background); border: 1px solid var(--color-border); border-radius: var(--radius-xl); box-shadow: var(--shadow-popover); padding: 16px; }
  .hd__mega-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .hd__mega-item { display: flex; gap: 11px; padding: 10px; border-radius: var(--radius-md); text-decoration: none; }
  .hd__mega-item:hover { background: var(--color-surface); }
  .hd__mega-icon { width: 36px; height: 36px; flex-shrink: 0; border-radius: var(--radius-md); background: var(--color-primary-soft); padding: 5px; }
  .hd__mega-icon img { width: 100%; height: 100%; object-fit: contain; }
  .hd__mega-name { display: block; font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
  .hd__mega-desc { display: block; font-size: 11px; color: var(--color-text-muted); margin-top: 2px; line-height: 1.35; }
  .hd__mega-all { display: inline-block; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border); color: var(--color-primary); font-weight: 600; font-size: var(--text-sm); text-decoration: none; width: 100%; }
  .hd__search { position: relative; flex: 1; max-width: 380px; margin-left: auto; }
  @media (max-width: 760px) { .hd__search:not(.hd__search--mobile) { display: none; } }
  .hd__search input { width: 100%; height: 42px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); padding: 0 12px 0 38px; font-size: var(--text-sm); font-family: inherit; color: var(--color-text); }
  .hd__search input:focus-visible { outline: none; border-color: var(--color-primary); background: var(--color-background); box-shadow: 0 0 0 3px var(--color-primary-soft); }
  .hd__search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); pointer-events: none; }
  .hd__actions { display: flex; align-items: center; gap: 2px; }
  .hd__icon-btn { width: 42px; height: 42px; display: inline-flex; align-items: center; justify-content: center; border: 0; background: none; border-radius: var(--radius-md); color: var(--color-text); cursor: pointer; position: relative; }
  .hd__icon-btn:hover { background: var(--color-surface); color: var(--color-primary); }
  .hd__cart-count { position: absolute; top: 4px; right: 4px; min-width: 17px; height: 17px; padding: 0 4px; border-radius: 9px; background: var(--color-primary); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .hd__burger { display: none; }
  @media (max-width: 1080px) { .hd__burger { display: inline-flex; } }
  .hd__mobile { border-top: 1px solid var(--color-border); padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; background: var(--color-background); }
  .hd__search--mobile { max-width: none; margin: 0 0 8px; display: block; }
  .hd__mobile-cap { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--color-text-subtle); font-weight: 700; margin: 6px 0 2px; }
  .hd__mobile-link { padding: 9px 8px; border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; color: var(--color-text); text-decoration: none; }
  .hd__mobile-link:hover { background: var(--color-surface); }
  .hd__mobile-div { height: 1px; background: var(--color-border); margin: 8px 0; }
  /* Hero */
  .hero { position: relative; background: var(--gradient-hero); border-bottom: 1px solid var(--color-border); overflow: hidden; }
  .hero__inner { display: grid; grid-template-columns: 1.05fr 1fr; gap: 56px; align-items: center; padding-block: clamp(48px, 6vw, 84px); }
  @media (max-width: 940px) { .hero__inner { grid-template-columns: 1fr; gap: 40px; } }
  .hero__eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: var(--radius-full); border: 1px solid var(--color-border); background: var(--color-background); font-size: var(--text-xs); font-weight: 500; color: var(--color-text-muted); }
  .hero__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-secondary); }
  .hero__title { font-size: clamp(40px, 5.6vw, 64px); font-weight: 800; letter-spacing: -0.02em; line-height: 1.08; color: var(--color-text); margin: 20px 0 0; }
  .hero__title-accent { color: var(--color-primary); }
  .hero__sub { margin: 20px 0 0; font-size: var(--text-lg); line-height: var(--leading-relaxed); color: var(--color-text-muted); max-width: 50ch; }
  .hero__cta { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }
  .hero__trust { display: flex; gap: 22px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--color-border); flex-wrap: wrap; }
  .hero__trust span { display: inline-flex; align-items: center; gap: 7px; font-size: var(--text-sm); font-weight: 500; color: var(--color-text); }
  .hero__trust svg { color: var(--color-primary); }
  .hero__art { position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .hero__tile { background: var(--color-background); border: 1px solid var(--color-border); border-radius: var(--radius-xl); box-shadow: var(--shadow-card); padding: 18px; display: flex; flex-direction: column; aspect-ratio: 3/4; }
  .hero__tile--up { margin-top: 32px; } .hero__tile--down { margin-top: -32px; }
  @media (max-width: 940px) { .hero__tile--up, .hero__tile--down { margin-top: 0; } }
  .hero__tile-img { flex: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 12px; }
  .hero__tile-img img { width: 78%; height: 78%; object-fit: contain; }
  .hero__tile-name { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); margin: 0; }
  .hero__tile-note { font-size: 11px; color: var(--color-text-muted); margin: 3px 0 0; }
  .hero__float { position: absolute; display: inline-flex; align-items: center; gap: 6px; padding: 8px 13px; border-radius: var(--radius-full); background: var(--color-background); box-shadow: var(--shadow-lg); font-size: var(--text-xs); font-weight: 600; color: var(--color-text); border: 1px solid var(--color-border); }
  .hero__float svg { color: var(--color-primary); }
  .hero__float--1 { top: -10px; left: -18px; } .hero__float--2 { bottom: 14px; right: -14px; }
  @media (max-width: 940px) { .hero__float { display: none; } }
  .hero__badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 28px; padding-bottom: 36px; }
  .hero__badges span { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--color-text-subtle); }
  /* Stats */
  .sec--stats { padding-block: clamp(40px, 4vw, 56px); }
  .stats__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  @media (max-width: 760px) { .stats__grid { grid-template-columns: repeat(2, 1fr); } }
  /* Categories */
  .cat__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 860px) { .cat__grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .cat__grid { grid-template-columns: 1fr; } }
  /* How it works */
  .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  @media (max-width: 900px) { .steps { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .steps { grid-template-columns: 1fr; } }
  .step__top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .step__icon { width: 48px; height: 48px; border-radius: var(--radius-lg); background: var(--color-primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; box-shadow: var(--shadow-brand); }
  .step__num { font-size: 30px; font-weight: 800; color: color-mix(in srgb, var(--color-primary) 22%, transparent); letter-spacing: -0.02em; }
  .step__title { font-size: var(--text-lg); font-weight: 600; color: var(--color-text); margin: 0 0 6px; }
  .step__desc { font-size: var(--text-sm); color: var(--color-text-muted); margin: 0; line-height: var(--leading-relaxed); }
  /* Why */
  .why__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 860px) { .why__grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .why__grid { grid-template-columns: 1fr; } }
  .why__card { background: var(--color-background); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: 26px; transition: transform .2s, box-shadow .2s, border-color .2s; }
  .why__card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card-hover); border-color: color-mix(in srgb, var(--color-primary) 30%, var(--color-border)); }
  .why__icon { width: 48px; height: 48px; border-radius: var(--radius-lg); background: var(--color-primary-soft); color: var(--color-primary-soft-fg); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 18px; }
  .why__title { font-size: var(--text-lg); font-weight: 600; color: var(--color-text); margin: 0 0 8px; }
  .why__desc { font-size: var(--text-sm); color: var(--color-text-muted); margin: 0; line-height: var(--leading-relaxed); }
  /* Products */
  .prod__scroll { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(260px, 1fr); gap: 18px; overflow-x: auto; padding-bottom: 8px; scroll-snap-type: x mandatory; }
  @media (min-width: 1024px) { .prod__scroll { grid-template-columns: repeat(4, 1fr); grid-auto-flow: row; overflow: visible; } }
  .prod__item { scroll-snap-align: start; }
  /* Partner */
  .partner { display: grid; grid-template-columns: 1.1fr 1fr; border-radius: var(--radius-2xl); overflow: hidden; box-shadow: var(--shadow-lg); }
  @media (max-width: 900px) { .partner { grid-template-columns: 1fr; } }
  .partner__copy { background: var(--gradient-brand); padding: clamp(32px, 4vw, 52px); color: #fff; }
  .partner__title { font: var(--text-h2); color: #fff; margin: 14px 0 0; letter-spacing: var(--tracking-tight); }
  .partner__sub { color: var(--green-100); margin: 14px 0 0; line-height: var(--leading-relaxed); max-width: 46ch; }
  .partner__benefits { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin: 28px 0 32px; }
  @media (max-width: 520px) { .partner__benefits { grid-template-columns: 1fr; } }
  .partner__benefit { display: flex; gap: 11px; }
  .partner__benefit-icon { width: 38px; height: 38px; flex-shrink: 0; border-radius: var(--radius-md); background: rgba(255,255,255,.16); color: #fff; display: inline-flex; align-items: center; justify-content: center; }
  .partner__benefit-title { font-size: var(--text-sm); font-weight: 600; color: #fff; margin: 0; }
  .partner__benefit-desc { font-size: 12px; color: var(--green-100); margin: 3px 0 0; line-height: 1.45; }
  .partner__panel { background: var(--color-background); padding: clamp(28px, 3vw, 44px); display: flex; flex-direction: column; justify-content: center; gap: 22px; }
  .partner__stat-v { font-size: 44px; font-weight: 800; color: var(--color-primary); letter-spacing: -0.02em; line-height: 1; }
  .partner__stat-l { font-size: var(--text-sm); color: var(--color-text-muted); }
  .partner__rows { display: flex; flex-direction: column; gap: 2px; }
  .partner__row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-top: 1px solid var(--color-border); }
  .partner__row span { display: inline-flex; align-items: center; gap: 9px; font-size: var(--text-sm); color: var(--color-text-muted); }
  .partner__row svg { color: var(--color-primary); }
  .partner__row strong { font-size: var(--text-base); font-weight: 700; color: var(--color-text); }
  /* Testimonials */
  .marq { overflow: hidden; -webkit-mask-image: linear-gradient(to right, transparent, #000 5%, #000 95%, transparent); mask-image: linear-gradient(to right, transparent, #000 5%, #000 95%, transparent); }
  .marq__track { display: flex; gap: 18px; width: max-content; animation: pe-marquee 48s linear infinite; }
  .marq:hover .marq__track { animation-play-state: paused; }
  @media (prefers-reduced-motion: reduce) { .marq__track { animation: none; } }
  .tmt { width: 340px; flex-shrink: 0; background: var(--color-background); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: 26px; box-shadow: var(--shadow-card); position: relative; }
  .tmt__quote { position: absolute; top: 22px; right: 22px; color: var(--color-primary-soft); }
  .tmt__stars { display: flex; gap: 1px; color: var(--color-secondary); margin-bottom: 14px; }
  .tmt__text { font-size: var(--text-sm); line-height: var(--leading-relaxed); color: var(--color-text); margin: 0 0 18px; }
  .tmt__by { display: flex; align-items: center; gap: 11px; border-top: 1px solid var(--color-border); padding-top: 16px; }
  .tmt__avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--color-primary-soft); color: var(--color-primary-soft-fg); font-size: var(--text-sm); font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
  .tmt__name { display: block; font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
  .tmt__role { display: block; font-size: 12px; color: var(--color-text-muted); }
  /* FAQ */
  .faq { max-width: 760px; }
  .faq__head { text-align: center; margin-bottom: 36px; }
  .faq__head .sec__sub { margin-inline: auto; }
  /* Final CTA */
  .finalcta { background: var(--gradient-brand); border-radius: var(--radius-2xl); padding: clamp(44px, 6vw, 72px); text-align: center; box-shadow: var(--shadow-lg); position: relative; overflow: hidden; }
  .finalcta::after { content: ""; position: absolute; inset: 0; background: radial-gradient(50% 100% at 50% 0%, rgba(255,255,255,.18), transparent 60%); pointer-events: none; }
  .finalcta__title { font: var(--text-h2); font-size: clamp(28px, 4vw, 42px); color: #fff; margin: 0; letter-spacing: var(--tracking-tight); position: relative; }
  .finalcta__sub { color: var(--green-100); margin: 14px auto 0; max-width: 50ch; font-size: var(--text-lg); line-height: var(--leading-relaxed); position: relative; }
  .finalcta__btns { display: flex; gap: 12px; justify-content: center; margin-top: 30px; flex-wrap: wrap; position: relative; }
  .finalcta__btn-light.pe-btn { background: #fff; color: var(--color-primary-hover); border-color: #fff; }
  .finalcta__btn-light.pe-btn:hover { background: var(--green-50); box-shadow: var(--shadow-lg); }
  .finalcta__btn-ghost.pe-btn { color: #fff; border: 1px solid rgba(255,255,255,.4); }
  .finalcta__btn-ghost.pe-btn:hover { background: rgba(255,255,255,.12); }
  /* Footer */
  .ft { background: var(--color-surface); border-top: 1px solid var(--color-border); }
  .ft__grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1.4fr; gap: 36px; padding-block: 56px; }
  @media (max-width: 980px) { .ft__grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { .ft__grid { grid-template-columns: 1fr; } }
  .ft__about { margin: 16px 0; font-size: var(--text-sm); color: var(--color-text-muted); line-height: var(--leading-relaxed); max-width: 38ch; }
  .ft__contact { display: flex; flex-direction: column; gap: 9px; }
  .ft__contact span { display: inline-flex; align-items: center; gap: 9px; font-size: var(--text-sm); color: var(--color-text-muted); }
  .ft__contact svg { color: var(--color-primary); flex-shrink: 0; }
  .ft__social { display: flex; gap: 9px; margin-top: 18px; }
  .ft__social a { width: 38px; height: 38px; border-radius: var(--radius-md); border: 1px solid var(--color-border); color: var(--color-text-muted); display: inline-flex; align-items: center; justify-content: center; }
  .ft__social a:hover { border-color: var(--color-primary); color: var(--color-primary); }
  .ft__col h3, .ft__news h3 { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); margin: 0 0 16px; }
  .ft__col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 11px; }
  .ft__col a { font-size: var(--text-sm); color: var(--color-text-muted); text-decoration: none; }
  .ft__col a:hover { color: var(--color-primary); }
  .ft__news p { font-size: var(--text-sm); color: var(--color-text-muted); margin: 0 0 14px; line-height: 1.5; }
  .ft__news-form { display: flex; gap: 8px; }
  .ft__news-form input { flex: 1; height: 42px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-background); padding: 0 12px; font-size: var(--text-sm); font-family: inherit; color: var(--color-text); min-width: 0; }
  .ft__news-form input:focus-visible { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-soft); }
  .ft__news-form button { width: 42px; height: 42px; flex-shrink: 0; border: 0; border-radius: var(--radius-md); background: var(--color-primary); color: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .ft__news-form button:hover { background: var(--color-primary-hover); }
  .ft__bottom { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding-block: 22px; border-top: 1px solid var(--color-border); flex-wrap: wrap; }
  .ft__bottom p { font-size: 12px; color: var(--color-text-muted); margin: 0; }
  .ft__legal { display: flex; gap: 20px; }
  .ft__legal a { font-size: 12px; color: var(--color-text-muted); text-decoration: none; }
  .ft__legal a:hover { color: var(--color-primary); }
  /* Drawer */
  .drawer__scrim { position: fixed; inset: 0; background: rgba(15,23,42,.4); opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 60; }
  .drawer__scrim.is-open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 400px; max-width: 90vw; background: var(--color-background); box-shadow: var(--shadow-lg); transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); z-index: 61; display: flex; flex-direction: column; }
  .drawer.is-open { transform: translateX(0); }
  .drawer__head { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px; border-bottom: 1px solid var(--color-border); }
  .drawer__head h3 { margin: 0; font-size: var(--text-lg); font-weight: 700; }
  .drawer__head h3 span { color: var(--color-text-muted); font-weight: 500; }
  .drawer__body { flex: 1; overflow-y: auto; padding: 16px 22px; display: flex; flex-direction: column; gap: 14px; }
  .drawer__empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; height: 100%; color: var(--color-text-subtle); }
  .drawer__item { display: flex; gap: 13px; align-items: center; }

/* ── Cart drawer ── */
function CartDrawer({ open, onClose, items }) {
  const total = items.reduce((s, i) => s + i.qty * i.unit, 0);
  return (
    <>
      <div className={`drawer__scrim${open ? " is-open" : ""}`} onClick={onClose} />
      <aside className={`drawer${open ? " is-open" : ""}`} aria-hidden={!open}>
        <div className="drawer__head">
          <h3>Your cart <span>({items.length})</span></h3>
          <button className="hd__icon-btn" onClick={onClose} aria-label="Close"><X /></button>
        </div>
        <div className="drawer__body">
          {items.length === 0 ? (
            <div className="drawer__empty"><Cart size={32} /><p>Your cart is empty</p></div>
          ) : items.map((it, i) => (
            <div key={i} className="drawer__item">
              <span className="drawer__item-img"><img src={`../../assets/illustrations/${it.img}.svg`} alt="" /></span>
              <div className="drawer__item-info"><p className="drawer__item-name">{it.name}</p><p className="drawer__item-meta">{it.meta}</p></div>
              <div className="drawer__item-price">{it.price}</div>
            </div>
          ))}
        </div>
        {items.length > 0 && (
          <div className="drawer__foot">
            <div className="drawer__total"><span>Subtotal</span><strong>₹{total.toLocaleString("en-IN")}</strong></div>
            <Button fullWidth size="lg" rightIcon={<ArrowRight size={16} />} onClick={onClose}>Checkout</Button>
          </div>
        )}
      </aside>
    </>
  );
}

/* ── Auth modal ── */
function AuthModal({ open, onClose }) {
  const [mode, setMode] = React.useState("login");
  if (!open) return null;
  return (
    <div className="modal__scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal__close hd__icon-btn" onClick={onClose} aria-label="Close"><X /></button>
        <div className="modal__brand"><img src="../../assets/logo-mark.svg" alt="" /><span>PrintEve</span></div>
        <h3 className="modal__title">{mode === "login" ? "Welcome back" : "Create your account"}</h3>
        <p className="modal__sub">{mode === "login" ? "Sign in to track orders and reorder." : "Join 10,000+ businesses printing with PrintEve."}</p>
        <form className="modal__form" onSubmit={(e) => { e.preventDefault(); onClose(); }}>
          {mode === "register" && <Input label="Full name" placeholder="Aditi Sharma" />}
          <Input label="Email" type="email" placeholder="you@company.com" />
          <Input label="Password" type="password" placeholder="••••••••" />
          <Button fullWidth size="lg" type="submit">{mode === "login" ? "Sign In" : "Create Account"}</Button>
        </form>
        <p className="modal__switch">
          {mode === "login" ? "New to PrintEve? " : "Already have an account? "}
          <button onClick={() => setMode(mode === "login" ? "register" : "login")}>{mode === "login" ? "Create an account" : "Sign in"}</button>
        </p>
      </div>
    </div>
  );
}

/* ── App root ── */
function App() {
  const [dark, setDark] = React.useState(false);
  const [cartOpen, setCartOpen] = React.useState(false);
  const [authOpen, setAuthOpen] = React.useState(false);
  const [cart, setCart] = React.useState([]);
  const [toast, setToast] = React.useState(null);
  const homeRef = React.useRef(null);

  React.useEffect(() => {
    if (homeRef.current) homeRef.current.setAttribute("data-theme", dark ? "dark" : "light");
  }, [dark]);

  function addToCart() {
    const p = DATA.products[0];
    setCart(c => [...c, { name: p.name, meta: "500 pcs · Matte", price: p.price, unit: 499, qty: 1, img: p.img }]);
    setCartOpen(true);
    setToast("Added to cart");
    setTimeout(() => setToast(null), 2200);
  }

  return (
    <div className="pe-home" ref={homeRef} data-theme="light">
      <SiteHeader cartCount={cart.length} onCartClick={() => setCartOpen(true)} dark={dark} onToggleDark={() => setDark(v => !v)} onOpenAuth={() => setAuthOpen(true)} />
      <main>
        <Hero onAddToCart={addToCart} />
        <Stats />
        <Categories />
        <HowItWorks />
        <WhyChooseUs />
        <FeaturedProducts onAddToCart={addToCart} />
        <PartnerSection />
        <Testimonials />
        <Faq />
        <FinalCta />
      </main>
      <SiteFooter />
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} items={cart} />
      <AuthModal open={authOpen} onClose={() => setAuthOpen(false)} />
      {toast && <div className="toast"><Check size={16} /> {toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
