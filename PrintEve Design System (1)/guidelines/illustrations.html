<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .tile { width: 100%; aspect-ratio: 1; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; padding: 14px; box-sizing: border-box; }
  .tile img { width: 100%; height: 100%; object-fit: contain; }
  .k { font-size: 11px; color: var(--color-text-muted); }
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="tile"><img src="../assets/illustrations/business-cards.svg" alt="" /></div><span class="k">Business Cards</span></div>
  <div class="sw"><div class="tile"><img src="../assets/illustrations/flyers.svg" alt="" /></div><span class="k">Flyers</span></div>
  <div class="sw"><div class="tile"><img src="../assets/illustrations/brochures.svg" alt="" /></div><span class="k">Brochures</span></div>
  <div class="sw"><div class="tile"><img src="../assets/illustrations/posters.svg" alt="" /></div><span class="k">Posters</span></div>
  <div class="sw"><div class="tile"><img src="../assets/illustrations/banners.svg" alt="" /></div><span class="k">Banners</span></div>
  <div class="sw"><div class="tile"><img src="../assets/illustrations/stickers.svg" alt="" /></div><span class="k">Stickers</span></div>
  <div class="sw"><div class="tile"><img src="../assets/illustrations/packaging.svg" alt="" /></div><span class="k">Packaging</span></div>
  <div class="sw"><div class="tile"><img src="../assets/illustrations/marketing-materials.svg" alt="" /></div><span class="k">Marketing</span></div>
  <div class="sw"><div class="tile"><img src="../assets/illustrations/bulk-printing.svg" alt="" /></div><span class="k">Bulk</span></div>
  <div class="sw"><div class="tile" style="background:var(--gradient-brand)"></div><span class="k">Brand gradient</span></div>
</div>
</body></html>
