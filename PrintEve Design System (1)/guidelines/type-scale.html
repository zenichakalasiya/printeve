<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="xs → 6xl, Inter" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--color-border); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-subtle); width: 120px; flex-shrink: 0; }
  .sample { color: var(--color-text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style></head>
<body>
  <div class="row"><span class="tag">6xl · 60</span><span class="sample" style="font-size:var(--text-6xl)">Print</span></div>
  <div class="row"><span class="tag">4xl · 36</span><span class="sample" style="font-size:var(--text-4xl)">Premium prints</span></div>
  <div class="row"><span class="tag">2xl · 24</span><span class="sample" style="font-size:var(--text-2xl)">Shop by category</span></div>
  <div class="row"><span class="tag">lg · 18</span><span class="sample" style="font-size:var(--text-lg)">Featured products today</span></div>
  <div class="row"><span class="tag">base · 16</span><span class="sample" style="font-size:var(--text-base);font-weight:400">Get instant quotes online</span></div>
  <div class="row"><span class="tag">sm · 14</span><span class="sample" style="font-size:var(--text-sm);font-weight:400">Standard turnaround 24–72 hours</span></div>
  <div class="row"><span class="tag">xs · 12</span><span class="sample" style="font-size:var(--text-xs);font-weight:500">ISO 9001 CERTIFIED</span></div>
</body></html>
