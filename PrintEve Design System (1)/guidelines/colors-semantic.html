<!-- @dsCard group="Colors" viewport="700x150" name="Semantic roles" subtitle="Primary, secondary, accent surface & foregrounds" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-lg); display: flex; align-items: flex-end; padding: 8px; border: 1px solid rgba(15,23,42,.06); font-size: 11px; font-weight: 600; }
  .k { font-size: 11px; font-weight: 600; color: var(--color-text); }
  .v { font-size: 10px; color: var(--color-text-muted); font-family: var(--font-mono); }
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--color-primary);color:#fff">Aa</div><span class="k">Primary</span><span class="v">#16A34A</span></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-hover);color:#fff">Aa</div><span class="k">Primary hover</span><span class="v">#15803D</span></div>
  <div class="sw"><div class="chip" style="background:var(--color-secondary);color:#fff">Aa</div><span class="k">Secondary</span><span class="v">#22C55E</span></div>
  <div class="sw"><div class="chip" style="background:var(--color-accent);color:var(--color-accent-fg)">Aa</div><span class="k">Accent surface</span><span class="v">#DCFCE7</span></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-soft);color:var(--color-primary-soft-fg)">Aa</div><span class="k">Soft tint fg</span><span class="v">#166534</span></div>
</div>
</body></html>
