<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base grid — 1 to 24" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; padding: 3px 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-subtle); width: 64px; }
  .bar { height: 14px; background: var(--color-primary); border-radius: 3px; }
  .px { font-size: 11px; color: var(--color-text-muted); }
</style></head>
<body>
  <div class="row"><span class="tag">space-1</span><div class="bar" style="width:var(--space-1)"></div><span class="px">4px</span></div>
  <div class="row"><span class="tag">space-2</span><div class="bar" style="width:var(--space-2)"></div><span class="px">8px</span></div>
  <div class="row"><span class="tag">space-3</span><div class="bar" style="width:var(--space-3)"></div><span class="px">12px</span></div>
  <div class="row"><span class="tag">space-4</span><div class="bar" style="width:var(--space-4)"></div><span class="px">16px</span></div>
  <div class="row"><span class="tag">space-6</span><div class="bar" style="width:var(--space-6)"></div><span class="px">24px</span></div>
  <div class="row"><span class="tag">space-8</span><div class="bar" style="width:var(--space-8)"></div><span class="px">32px</span></div>
  <div class="row"><span class="tag">space-12</span><div class="bar" style="width:var(--space-12)"></div><span class="px">48px</span></div>
  <div class="row"><span class="tag">space-16</span><div class="bar" style="width:var(--space-16)"></div><span class="px">64px</span></div>
</body></html>
