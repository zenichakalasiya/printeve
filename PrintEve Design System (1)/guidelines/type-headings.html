<!-- @dsCard group="Type" viewport="700x260" name="Display & headings" subtitle="Inter — display, H1, H2, H3" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--color-background); }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .item { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-subtle); width: 90px; flex-shrink: 0; }
  .d { font: var(--text-display); letter-spacing: var(--tracking-tight); color: var(--color-text); margin:0; }
  .h1 { font: var(--text-h1); letter-spacing: var(--tracking-tight); color: var(--color-text); margin:0; }
  .h2 { font: var(--text-h2); letter-spacing: var(--tracking-snug); color: var(--color-text); margin:0; }
  .h3 { font: var(--text-h3); color: var(--color-text); margin:0; }
</style></head>
<body>
<div class="stack">
  <div class="item"><span class="tag">display/60</span><p class="d">Print made simple</p></div>
  <div class="item"><span class="tag">h1/36</span><p class="h1">Premium prints for your brand</p></div>
  <div class="item"><span class="tag">h2/30</span><p class="h2">Why businesses choose PrintEve</p></div>
  <div class="item"><span class="tag">h3/20</span><p class="h3">Premium Print Quality</p></div>
</div>
</body></html>
