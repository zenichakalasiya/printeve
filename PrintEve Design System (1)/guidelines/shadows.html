<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation" subtitle="Shadow tokens on white" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 30px; background: var(--color-surface); font-family: var(--font-sans); }
  .row { display: flex; gap: 26px; }
  .sw { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 110px; height: 64px; background: var(--color-background); border-radius: var(--radius-lg); }
  .k { font-size: 11px; font-weight: 600; color: var(--color-text); }
  .v { font-size: 10px; color: var(--color-text-muted); font-family: var(--font-mono); }
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="k">xs</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="k">card</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-card-hover)"></div><span class="k">card-hover</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="k">lg</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-brand)"></div><span class="k">brand glow</span></div>
</div>
</body></html>
