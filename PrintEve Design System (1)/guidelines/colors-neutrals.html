<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — slate" subtitle="Text, surfaces & borders" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); font-family: var(--font-sans); }
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(15,23,42,.08); }
  .k { font-size: 11px; font-weight: 600; color: var(--color-text); }
  .v { font-size: 10px; color: var(--color-text-muted); font-family: var(--font-mono); }
</style></head>
<body>
<div class="scale">
  <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><span class="k">50</span><span class="v">surface</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><span class="k">100</span><span class="v">surface-2</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><span class="k">200</span><span class="v">border</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><span class="k">300</span><span class="v">border+</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><span class="k">400</span><span class="v">subtle</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><span class="k">500</span><span class="v">muted</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-600)"></div><span class="k">600</span><span class="v">#475569</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><span class="k">700</span><span class="v">#334155</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-800)"></div><span class="k">800</span><span class="v">#1E293B</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><span class="k">900</span><span class="v">text</span></div>
</div>
</body></html>
